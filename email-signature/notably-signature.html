<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notably — Email Signature</title>
<!-- Webfonts load in clients that support them (e.g. Apple Mail); everything
     falls back to system fonts (Gmail, Outlook) via the stacks below.
     Hanken Grotesk ≈ Rhetorik Sans  (name)
     Lora          ≈ Rhetorik Serif (role / contact) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
</head>
<body style="margin:0; padding:24px; background:#ffffff;">

  <!-- ===== EMAIL SIGNATURE (copy this table into your mail client) ===== -->
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
    <tr>

      <!-- Icon (matched to the height of the info block) -->
      <td valign="top" style="padding:0;">
        <a href="https://notablyrecruit.com" style="text-decoration:none; border:0; outline:none;">
          <img src="notably-icon.png" alt="Notably" width="121" height="121"
               style="display:block; border:0; outline:none; width:121px; height:121px; border-radius:22px;">
        </a>
      </td>

      <!-- Spacer + vertical divider line (full height of the block) -->
      <td style="width:1px; padding:0 0 0 22px;">
        <div style="width:1px; height:121px; background:#272826; font-size:0; line-height:0;">&nbsp;</div>
      </td>

      <!-- Wordmark + info -->
      <td valign="top" style="padding:0 0 0 22px;">

        <!-- Wordmark -->
        <a href="https://notablyrecruit.com" style="text-decoration:none; border:0; outline:none;">
          <img src="notably-wordmark.png" alt="Notably" width="104" height="29"
               style="display:block; border:0; outline:none; width:104px; height:auto; margin:0 0 8px 0;">
        </a>

        <!-- Name (Hanken Grotesk ≈ Rhetorik Sans) -->
        <div style="font-family:'Hanken Grotesk','Helvetica Neue',Arial,sans-serif; font-size:16px; font-weight:700; line-height:1.2; color:#272826; letter-spacing:0.2px; margin:0 0 1px 0;">
          Julie Anich
        </div>

        <!-- Role (Lora ≈ Rhetorik Serif) -->
        <div style="font-family:'Lora',Georgia,'Times New Roman',serif; font-size:13px; line-height:1.4; color:#57574f; margin:0 0 7px 0;">
          Founder
        </div>

        <!-- Email (Lora ≈ Rhetorik Serif) -->
        <div style="font-family:'Lora',Georgia,'Times New Roman',serif; font-size:13px; line-height:1.4; margin:0 0 1px 0;">
          <a href="mailto:julie@notablyrecruit.com" style="color:#272826; text-decoration:none;">julie@notablyrecruit.com</a>
        </div>

        <!-- Location (Lora ≈ Rhetorik Serif) -->
        <div style="font-family:'Lora',Georgia,'Times New Roman',serif; font-size:12px; line-height:1.4; color:#8a8a82; margin:0;">
          Denver, CO
        </div>

      </td>
    </tr>
  </table>
  <!-- ===== END EMAIL SIGNATURE ===== -->

</body>
</html>
